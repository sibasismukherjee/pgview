version: "2"

linters:
  # Default set (errcheck, govet, ineffassign, staticcheck, unused) plus extras.
  enable:
    - misspell
    - unconvert
    - bodyclose
    - copyloopvar
    - gocritic

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sibasismukherjee/pgview

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
