version: "2"

linters:
  # Defaults: errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
    - unconvert
    - bodyclose
    - copyloopvar
    - gocritic
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sibasismukherjee/pgview
