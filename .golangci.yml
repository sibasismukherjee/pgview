version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/sibasismukherjee/pgview

issues:
  exclude-rules:
    # Test files may use unexported helpers freely.
    - path: "_test\\.go"
      linters:
        - errcheck
