<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#252526"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e3460"/>
      <stop offset="100%" style="stop-color:#094771"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="url(#bg)"/>

  <!-- Terminal window bar -->
  <rect x="10" y="10" width="100" height="18" rx="4" fill="url(#accent)"/>

  <!-- Traffic light dots -->
  <circle cx="22" cy="19" r="3.5" fill="#f44747" opacity="0.85"/>
  <circle cx="33" cy="19" r="3.5" fill="#dcdcaa" opacity="0.85"/>
  <circle cx="44" cy="19" r="3.5" fill="#4ec9b0" opacity="0.85"/>

  <!-- Window label -->
  <text x="60" y="23" text-anchor="middle" font-family="monospace,ui-monospace,Menlo" font-size="7" fill="#9cdcfe" font-weight="bold">pgview</text>

  <!-- Table header row -->
  <rect x="10" y="32" width="100" height="11" rx="2" fill="#252526"/>
  <text x="16" y="41" font-family="monospace,ui-monospace,Menlo" font-size="6.5" fill="#9cdcfe" font-weight="bold">id</text>
  <text x="30" y="41" font-family="monospace,ui-monospace,Menlo" font-size="6.5" fill="#9cdcfe" font-weight="bold">name</text>
  <text x="68" y="41" font-family="monospace,ui-monospace,Menlo" font-size="6.5" fill="#9cdcfe" font-weight="bold">status</text>

  <!-- Selected row highlight -->
  <rect x="10" y="43" width="100" height="10" rx="1" fill="#094771"/>
  <text x="13" y="51" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#ffffff">▶</text>
  <text x="19" y="51" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#ffffff">1</text>
  <text x="30" y="51" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#ffffff">Alice</text>
  <text x="68" y="51" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#4ec9b0">active</text>

  <!-- Row 2 -->
  <text x="19" y="62" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#6a6a6a">2</text>
  <text x="30" y="62" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#d4d4d4">Bob</text>
  <text x="68" y="62" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#f44747">inactive</text>

  <!-- Row 3 -->
  <text x="19" y="72" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#6a6a6a">3</text>
  <text x="30" y="72" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#d4d4d4">Carol</text>
  <text x="68" y="72" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#4ec9b0">active</text>

  <!-- Row 4 -->
  <text x="19" y="82" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#6a6a6a">4</text>
  <text x="30" y="82" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#d4d4d4">Dave</text>
  <text x="68" y="82" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#dcdcaa">pending</text>

  <!-- Divider lines -->
  <line x1="10" y1="43" x2="110" y2="43" stroke="#3e3e3e" stroke-width="0.5"/>
  <line x1="10" y1="53" x2="110" y2="53" stroke="#3e3e3e" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="10" y1="63" x2="110" y2="63" stroke="#3e3e3e" stroke-width="0.3" stroke-dasharray="2,2"/>
  <line x1="10" y1="73" x2="110" y2="73" stroke="#3e3e3e" stroke-width="0.3" stroke-dasharray="2,2"/>

  <!-- Filter prompt bar -->
  <rect x="10" y="88" width="100" height="12" rx="2" fill="#007acc"/>
  <text x="15" y="97" font-family="monospace,ui-monospace,Menlo" font-size="6" fill="#ffffff" font-weight="bold">filter</text>
  <text x="38" y="97" font-family="monospace,ui-monospace,Menlo" font-size="6" fill="#cce8ff">status=active▌</text>

  <!-- Bottom status bar -->
  <rect x="10" y="103" width="100" height="9" rx="2" fill="#0e3460"/>
  <text x="15" y="110" font-family="monospace,ui-monospace,Menlo" font-size="5.5" fill="#c8daf0">4 rows  ·  PK: id  ·  2 idx</text>
</svg>
