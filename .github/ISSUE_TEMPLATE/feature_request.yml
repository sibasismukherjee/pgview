name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Features are more likely to land if they align with the core goal: a fast, keyboard-driven PostgreSQL viewer that stays out of the way.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that pgview doesn't support today?
      placeholder: "I find it hard to… / There's no way to…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour you'd like, with concrete examples (key bindings, filter syntax, output format, …).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer your proposal.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested before.
          required: true
