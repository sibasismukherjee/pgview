name: Sync Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'main.go'
      - '.github/wiki/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual sync'

jobs:
  sync-wiki:
    name: Sync wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep -oP 'var version = "\K[^"]+' main.go)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Clone wiki
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          git clone "$WIKI_URL" wiki

      - name: Build Home.md from README
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          python3 - << 'EOF'
          import os, re, pathlib, textwrap

          readme  = pathlib.Path("README.md").read_text()
          version = os.environ["VERSION"]
          repo    = os.environ["REPO"]

          # Extract the Features bullet list from README
          m = re.search(r'## Features\n(.*?)(?=\n---|\Z)', readme, re.DOTALL)
          features = m.group(0).strip() if m else "## Features\n\n_(see README)_"

          # Extract Installation section
          m = re.search(r'## Installation\n(.*?)(?=\n---|\Z)', readme, re.DOTALL)
          install = m.group(0).strip() if m else ""

          # Extract Usage section
          m = re.search(r'## Usage\n(.*?)(?=\n---|\Z)', readme, re.DOTALL)
          usage = m.group(0).strip() if m else ""

          home = textwrap.dedent(f"""\
          # pgview

          > A lightweight, keyboard-driven PostgreSQL browser for the terminal — built in Go using the same TUI framework as [k9s](https://k9scli.io/).

          Connect to any PostgreSQL-compatible endpoint (direct host, pgBouncer, RDS Proxy, SSH tunnel, …) and navigate tables, inspect columns, paginate rows, and run SQL queries — all without leaving your terminal.

          **Version:** v{version} · [Releases](https://github.com/{repo}/releases) · [Documentation](https://sibasismukherjee.github.io/pgview.html) · [Try it →](https://sibasismukherjee.github.io/try-pgview.html)

          ---

          {features}

          ---

          {install}

          ---

          {usage}

          ---

          ## Wiki pages

          - [[Keyboard Reference]] — complete key bindings for every view
          - [[Filter DSL]] — the `/` filter mini-language reference
          - [[SQL Templates]] — pre-filled templates and how to use them
          - [[Roadmap]] — planned features and timeline

          ---

          ## Contributing

          1. Search or open an [Issue](https://github.com/{repo}/issues) first
          2. Fork → branch from `main` → PR
          3. Tests and lint must pass — CI runs automatically on every PR

          MIT License — see [LICENSE](https://github.com/{repo}/blob/main/LICENSE).
          """)

          pathlib.Path("wiki/Home.md").write_text(home)
          print("Home.md written")
          EOF

      - name: Copy static wiki pages
        run: cp .github/wiki/*.md wiki/

      - name: Commit and push wiki
        run: |
          cd wiki
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes — already up to date"
          else
            git commit -m "wiki: sync from v${{ steps.ver.outputs.version }} [skip ci]"
            WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
            git push "$WIKI_URL" HEAD:master
          fi

  notify-portfolio:
    name: Trigger portfolio update
    runs-on: ubuntu-latest
    needs: sync-wiki

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          VERSION=$(grep -oP 'var version = "\K[^"]+' main.go)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Dispatch to portfolio repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_PAT }}
          repository: sibasismukherjee/sibasismukherjee.github.io
          event-type: pgview-docs-updated
          client-payload: '{"version":"${{ steps.ver.outputs.version }}","sha":"${{ github.sha }}"}'
