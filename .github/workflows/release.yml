name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release with changelog
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the block between ## [vX.Y.Z] and the next ## heading
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Write to a file to avoid multiline env var quoting issues
          echo "$NOTES" > release_notes.md

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false

  release:
    name: Build and publish release binaries
    needs: create-release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="pgview_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          go build \
            -ldflags "-X main.version=${VERSION} -s -w" \
            -o "${BINARY}" \
            .
          echo "ASSET=${BINARY}" >> "$GITHUB_ENV"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: false
