services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: demo
      POSTGRES_DB:       demodb
    ports:
      - "5433:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d demodb"]
      interval: 2s
      timeout:  5s
      retries:  15
